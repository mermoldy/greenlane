name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to publish, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: greenlane

jobs:
  verify-version:
    name: Verify tag matches Cargo.toml
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Check version
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          cargo_version=$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "(.*)"/\1/')
          expected="v${cargo_version}"
          if [ "$RELEASE_TAG" != "$expected" ]; then
            echo "::error::Release tag $RELEASE_TAG does not match Cargo.toml version ($expected)." \
                 "Bump version in Cargo.toml to match the tag (or retag), then re-run." >&2
            exit 1
          fi
          echo "Tag $RELEASE_TAG matches Cargo.toml ($expected)."

  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    needs: verify-version

    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact: linux_amd64
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            builder: cross
          - artifact: linux_arm64
            os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            builder: cross
          - artifact: darwin_arm64
            os: macos-14
            target: aarch64-apple-darwin
            builder: cargo

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # For a manual run, build the exact tag being published (not the
          # workflow-selected branch/SHA); a tag push already checks out the tag.
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install viewer dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Build viewer
        working-directory: web
        run: bun run build

      - name: Install cross
        if: matrix.builder == 'cross'
        run: cargo install cross --locked

      - name: Build release binary
        run: ${{ matrix.builder }} build --release --locked --target ${{ matrix.target }}

      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail

          staging="dist/${BIN_NAME}-${{ matrix.artifact }}"
          archive="${BIN_NAME}-${{ matrix.artifact }}.tar.gz"

          mkdir -p "$staging"
          cp "target/${{ matrix.target }}/release/${BIN_NAME}" "$staging/${BIN_NAME}"
          chmod +x "$staging/${BIN_NAME}"
          cp README.md "$staging/README.md"

          tar -C dist -czf "dist/$archive" "${BIN_NAME}-${{ matrix.artifact }}"

          cd dist
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$archive" > "$archive.sha256"
          else
            shasum -a 256 "$archive" > "$archive.sha256"
          fi

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: greenlane-${{ matrix.artifact }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Publish assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail

          cd dist
          sha256sum *.tar.gz > SHA256SUMS
          cd ..

          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || \
            gh release create "$RELEASE_TAG" --verify-tag --title "$RELEASE_TAG" --generate-notes

          gh release upload "$RELEASE_TAG" dist/* --clobber
