version: 2
updates:
  # Rust crates (Cargo.toml / Cargo.lock at the repo root)
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      cargo:
        patterns:
          - "*"

  # Python dependencies (pyproject.toml / uv.lock at the repo root)
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      python:
        patterns:
          - "*"

  # Web dependencies (web/package.json + bun.lock)
  - package-ecosystem: "bun"
    directory: "/web"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      web:
        patterns:
          - "*"

  # GitHub Actions used in .github/workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns:
          - "*"
