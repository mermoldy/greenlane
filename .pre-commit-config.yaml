minimum_pre_commit_version: "4.0.0"

default_stages: [pre-commit]

exclude: |
  (?x)^(
    target/|
    web/dist/|
    web/node_modules/|
    \.venv/|
    .*\.tsbuildinfo$|
    .*\.glr$
  )

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-json
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: trailing-whitespace

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all --
        language: system
        pass_filenames: false
        types: [rust]

      - id: ruff-check
        name: ruff check --fix
        entry: uv run ruff check --fix --exit-non-zero-on-fix
        language: system
        types_or: [python, pyi]

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]

      - id: prettier
        name: prettier
        entry: web/node_modules/.bin/prettier --write --ignore-unknown
        language: system
        files: \.(css|html|json|md|tsx?|ya?ml)$

      - id: markdownlint
        name: markdownlint
        entry: web/node_modules/.bin/markdownlint-cli2 --fix
        language: system
        types: [markdown]

      - id: typescript-typecheck
        name: TypeScript typecheck
        entry: bun run --cwd web typecheck
        language: system
        pass_filenames: false
        files: ^web/.*\.(ts|tsx|json)$

      - id: ty-check
        name: ty check
        entry: uv run ty check --no-progress
        language: system
        pass_filenames: false
        types_or: [python, pyi]

      - id: pytest
        name: pytest
        entry: uv run pytest
        language: system
        pass_filenames: false
        types_or: [python, pyi]

      - id: typescript-tests
        name: TypeScript tests
        entry: bun run --cwd web test
        language: system
        pass_filenames: false
        files: ^web/.*\.(ts|tsx)$

  - repo: https://github.com/lycheeverse/lychee
    rev: lychee-v0.21.0
    hooks:
      - id: lychee
        name: lychee
        args: ["--offline", "--no-progress"]
        types_or: [markdown, html, yaml]
